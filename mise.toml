# MSearchDB - Database in Rust to full text search
[tools]
cargo = "latest"
rust = "latest"

[tasks.build]
run = "cargo build"
description = "Compile the project in debug mode (default for development)"

[tasks.build_release]
run = "cargo build --release"
description = "Compile the project in release mode (optimized for production)"

[tasks.run]
run = "cargo run"
description = "Compile and run the project (debug mode)"
alias = "r"

[tasks.test]
run = "cargo test"
description = "Run all tests to ensure the code is working as expected"

[tasks.check]
run = "cargo check"
description = "Check the code for errors without producing an executable (faster than build)"

[tasks.lint]
run = "cargo clippy -- -D warnings"
description = "Run Clippy to catch common mistakes and improve code quality (treat warnings as errors)"

[tasks.format]
run = "cargo fmt"
description = "Format the code according to Rust's style guidelines"

[tasks.clean]
run = "cargo clean"
description = "Remove the target directory and all compiled artifacts, giving you a clean slate"

[tasks.dev]
depends_post = ["run"]
run = "cargo fmt"
description = "Format the code and then run the project, ideal for development workflow"
